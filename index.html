<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Confession 💌</title>

    <!-- ✅ FAVICON -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='85' font-size='90' text-anchor='middle' x='50'>💌</text></svg>"
    />
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='85' font-size='90' text-anchor='middle' x='50'>💌</text></svg>"
    />

    <!-- ✅ SEO META TAGS -->
    <meta
      name="description"
      content="A beautiful interactive love confession with animations, music, and heartfelt emotions."
    />
    <meta
      name="keywords"
      content="love confession, romantic webpage, digital love letter, interactive romance"
    />
    <meta name="author" content="Sila" />
    <meta name="robots" content="index, follow" />

    <!-- ✅ Open Graph (Facebook, WhatsApp, etc.) -->
    <meta property="og:title" content="A Confession 💌" />
    <meta
      property="og:description"
      content="A heartfelt interactive digital love letter made especially for someone special."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yeszone.vercel.app/" />
    <meta
      property="og:image"
      content="https://yeszone.vercel.app/og-image.jpg"
    />
    <meta property="og:site_name" content="A Confession 💌" />

    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="A Confession 💌" />
    <meta
      name="twitter:description"
      content="An interactive digital love confession with music and animations."
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Floating hearts background -->
    <div id="hearts-bg"></div>

    <!-- Audio -->
    <audio id="bg-music" loop>
      <source src="#" type="audio/mpeg" />
      <source
        src="https://cdn.pixabay.com/download/audio/2022/10/18/audio_31c2730e64.mp3?filename=romantic-piano-124970.mp3"
        type="audio/mpeg"
      />
    </audio>

    <!-- Controls -->
    <div class="fixed top-6 right-6 z-50 flex gap-4">
      <button
        id="music-btn"
        class="w-10 h-10 rounded-full glass flex items-center justify-center text-rose hover:bg-white/10 transition-all border border-rose/30"
      >
        <i class="fas fa-music" id="music-icon"></i>
      </button>
    </div>

    <!-- ── SCREEN 1: Intro ── -->
    <div id="intro-screen" class="screen">
      <div
        id="intro-card"
        class="glass"
        style="position: relative; overflow: hidden"
      >
        <span
          class="card-deco"
          style="top: 12px; left: 18px; animation-delay: 0s"
          >💜</span
        >
        <span
          class="card-deco"
          style="top: 14px; right: 22px; animation-delay: 1.5s"
          >🩷</span
        >
        <span
          class="card-deco"
          style="
            bottom: 14px;
            left: 24px;
            animation-delay: 0.8s;
            font-size: 0.85rem;
          "
          >✨</span
        >
        <span
          class="card-deco"
          style="
            bottom: 14px;
            right: 20px;
            animation-delay: 2s;
            font-size: 0.9rem;
          "
          >💙</span
        >
        <p class="card-eyebrow">💌 just for you</p>
        <h1 class="card-title">A confession from my heart...</h1>
        <p class="card-body" id="intro-msg"></p>
        <button class="cta-btn" id="lets-see-btn">Let's see ✨</button>
      </div>
    </div>

    <!-- ── SCREEN 2: Question ── -->
    <div id="question-screen" class="screen hidden">
      <div id="question-content">
        <h2 class="q-title">Do you love me? ✨</h2>
        <div id="buttons-area">
          <button class="answer-btn glass" id="yes-btn">Yes 💕</button>
        </div>
      </div>
    </div>

    <!-- No button (positioned fixed so it can escape anywhere) -->
    <button class="answer-btn" id="no-btn" style="display: none">No</button>

    <!-- ── RESULT MODAL ── -->
    <div id="result-modal">
      <div id="result-card" class="glass">
        <span class="result-emoji" id="result-emoji">❤️</span>
        <p class="result-text" id="result-text"></p>
        <div
          style="
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 20px;
          "
        >
          <button
            class="cta-btn"
            id="home-btn"
            style="
              background: linear-gradient(
                135deg,
                rgba(189, 224, 254, 0.7),
                rgba(162, 210, 255, 0.7)
              );
              color: #0c5da6;
            "
          >
            Home 🏠
          </button>
          <button class="cta-btn" id="close-modal-btn">Aww 🥰</button>
        </div>
      </div>
    </div>

    <!-- ── FOOTER ── -->
    <footer id="footer">
      <div id="footer-inner">
        <span
          style="
            font-size: 0.75rem;
            color: #9b7ab5;
            font-weight: 500;
            letter-spacing: 0.08em;
          "
          >find me ✨</span
        >
        <a
          href="https://github.com/sila911"
          class="footer-link"
          title="GitHub"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div
            style="
              width: 18px;
              height: 18px;
              background-color: currentColor;
              -webkit-mask: url(&quot;https://cdn.simpleicons.org/github&quot;)
                center/contain no-repeat;
              mask: url(&quot;https://cdn.simpleicons.org/github&quot;)
                center/contain no-repeat;
            "
          ></div>
        </a>
        <a
          href="https://www.chess.com/member/siladev"
          class="footer-link"
          title="Chess.com"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div
            style="
              width: 18px;
              height: 18px;
              background-color: currentColor;
              -webkit-mask: url(&quot;https://cdn.simpleicons.org/chessdotcom&quot;)
                center/contain no-repeat;
              mask: url(&quot;https://cdn.simpleicons.org/chessdotcom&quot;)
                center/contain no-repeat;
            "
          ></div>
        </a>
        <a
          href="https://www.duolingo.com/profile/whos.sila"
          class="footer-link"
          title="Duolingo"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div
            style="
              width: 18px;
              height: 18px;
              background-color: currentColor;
              -webkit-mask: url(&quot;https://cdn.simpleicons.org/duolingo&quot;)
                center/contain no-repeat;
              mask: url(&quot;https://cdn.simpleicons.org/duolingo&quot;)
                center/contain no-repeat;
            "
          ></div>
        </a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
